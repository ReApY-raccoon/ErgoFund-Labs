# SvelteKit + @sveltejs/adapter-netlify (NETLIFY=true). Repo root = site root.
# Dashboard: https://app.netlify.com/teams/aahilmak318/projects — Import from GitHub → this repo.
# Set PUBLIC_API_URL in Netlify UI to your deployed API; set CORS on the API to your *.netlify.app URL.
[build]
  publish = "apps/frontend/build"
  command = "npm --prefix packages/sdk ci && npm --prefix packages/sdk run build && npm --prefix apps/frontend ci && npm --prefix apps/frontend run build"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

# Serverless output from the adapter (path relative to repo root).
[functions]
  directory = "apps/frontend/.netlify/functions-internal"
  node_bundler = "esbuild"
